<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Price Comparison Snapshot - Price Tracker</title>
    <style>
        body {
            font-family: 'Roboto', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 900px;
            margin: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            margin-right: 15px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
            display: inline-block;
            margin-bottom: 15px;
        }

        a:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(255,255,255,0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
        }

        th {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
            position: sticky;
            top: 0;
        }

        tr {
            transition: all 0.2s ease;
        }

        tr:hover {
            background-color: rgba(52, 73, 94, 0.1);
            transform: scale(1.02);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            th, td { padding: 10px 12px; font-size: 0.9em; }
            a { padding: 8px 12px; margin-right: 10px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Price Comparison Snapshot</h1>

    <table>
        <thead>
        <tr>
            <th>Product</th>
            <th>Lowest Price</th>
            <th>Vendor</th>
            <th>Date Added</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${snapshot}">
            <td th:text="${entry.key.name}"></td>
            <td th:text="${entry.value != null ? entry.value.price : 'N/A'}"></td>
            <td th:text="${entry.value != null ? entry.value.vendor.name : 'N/A'}"></td>
            <td th:text="${entry.value != null ? #temporals.format(entry.value.dateAdded, 'yyyy-MM-dd HH:mm') : 'N/A'}"></td>
        </tr>
        </tbody>
    </table>

    <div style="margin-top: 20px;">
        <a href="/products">Products</a>
        <a href="/vendors">Vendors</a>
        <a href="/prices">Prices</a>
    </div>
</div>
</body>
</html>
